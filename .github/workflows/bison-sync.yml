name: EmailBison campaign sync

# Hits /api/cron/bison-sync on the deployed app every 6 hours so each client's
# EmailBison campaigns stay fresh in the bison_campaigns table.
# Requires a repo Actions secret: CRON_TOKEN (matches CRON_TOKEN on Railway).

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bison-sync
        run: |
          curl -fsS -X POST "https://web-production-eba31.up.railway.app/api/cron/bison-sync" \
            -H "x-cron-token: ${{ secrets.CRON_TOKEN }}" \
            --max-time 290
